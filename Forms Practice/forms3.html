<!DOCTYPE html>

<html>
  <header>MY PORTFOLIO</header>
  
  <head>
    <link rel="stylesheet" href="forms3.css"/>
    <title>My first Website</title>
  </head>
    <body>
          <form action="action_page.php" method="get">
            <div>
            <label for="fname">First name:</label>
            <input type="text" id="fname" name="fname" placeholder="spongebob" required> 
            </div>
            <br>

            <div>
            <label for="lname">Last name:</label>
            <input type="text" id="lname" name="lname" placeholder="squarepants" required> 
            </div>

             <br>

            <div>
              <label for="pass">Password:</label>
              <input type="password" id="pass" maxlength="10" required>
            </div>
            <br>

            <div>
              <input type="email" id="email" name="email" placeholder="spants.gmail.com" required>
            </div>
            <br>
             
            <div>
              <label for="phone"> phone #:</label>
            <input type="tel" id="phone" name="phone" placeholder="[123]-904-[543]">
            </div>
             <br>

             <div>
              <label for="bdate">birthdate:</label>
              <input type="date" id="bdate" name="bdate">
             </div>

              <br>

             <div>
              <label for="quantity">quantity:</label>
              <input type="number" id="quantity" name="quantity" min="0" max="99" value="34">
             </div>

             <br>
            
             <div>
               <label for="title">title:</label>


              <label>Mr.</label>
              <input type="radio" id="Mr." name="title" value="Mr.">

              <label>Mrs.</label>
              <input type="radio" id="Mrs'" name="title" value="Mrs.">

              <label>PhD.</label>
              <input type="radio" id="PhD" name="title" value="PhD.">
             </div>
              
             <br>


             <label for="payment">payment</label>
             <select id="payment" name="payment">
              <option value="visa">visa</option>
              <option value="mastercard">mastercard</option>
              <option value="giftcard">giftcard</option>
             </select>
              <div>

                <br>

                <div>
                  <label for="subscibe">subscibe</label>
                  <input type="checkbox" id="subscibe" name="subscibe">
                </div>

                <br>
                             
              <input type="reset">
            </div>

            <br>
          
            <div>
              <input type="submit">
              <button class="reset-button">reset</button>
            </div> 
          </form> 


    </body>
</html>
